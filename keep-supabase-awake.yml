name: Keep Supabase Awake

# Бесплатный проект Supabase "засыпает" после 7 дней без обращений к базе.
# Этот workflow раз в 3 дня дёргает таблицу global_multipliers — этого
# достаточно чтобы Supabase считал проект активным.
#
# НАСТРОЙКА (один раз):
# 1. Репозиторий → Settings → Secrets and variables → Actions → New repository secret
# 2. Имя: SUPABASE_URL       Значение: твой Project URL (https://xxxxx.supabase.co)
# 3. Имя: SUPABASE_ANON_KEY  Значение: твой anon public key
# Если секреты не заданы — workflow просто завершится без ошибки.

on:
  schedule:
    - cron: '0 6 */3 * *'   # каждые 3 дня в 06:00 UTC
  workflow_dispatch:         # + кнопка "Run workflow" вручную в Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent free-tier pause
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL не задан в секретах — пропускаем (это нормально, если глобальное обучение ещё не настроено)"
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/global_multipliers?select=type&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo " — Supabase ping отправлен"
