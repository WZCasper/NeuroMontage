<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroClip v1</title>
<script src="coi-serviceworker.js"></script>
<style>
:root{
  --bg:#06060f;--bg2:#0d0d1c;--bg3:#131325;--bg4:#1b1b35;
  --p:#7c3aed;--pl:#a855f7;--ac:#06b6d4;--ok:#10b981;--err:#ef4444;--warn:#f59e0b;
  --tx:#e2e8f0;--txd:#94a3b8;--bor:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 15% 10%,rgba(124,58,237,.1) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 90%,rgba(6,182,212,.06) 0%,transparent 50%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}

/* ─── TOAST ─── */
.toast-box{position:fixed;top:1.25rem;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{padding:.75rem 1.2rem;border-radius:10px;font-weight:600;font-size:.88rem;
  max-width:320px;pointer-events:auto;animation:tIn .3s ease;line-height:1.4;
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-ok{background:var(--ok);color:#fff}
.toast-err{background:var(--err);color:#fff}
.toast-info{background:var(--p);color:#fff}
.toast.out{animation:tOut .3s ease forwards}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tOut{to{transform:translateX(110%);opacity:0}}

/* ─── LAYOUT ─── */
.wrap{max-width:960px;margin:0 auto;padding:0 1.25rem 5rem;position:relative;z-index:1}

/* ─── HEADER ─── */
.hdr{text-align:center;padding:3rem 0 1.75rem}
.logo{font-size:2.6rem;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,#c084fc 0%,#06b6d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ver{font-size:1rem;font-weight:700;background:rgba(6,182,212,.15);
  border:1px solid rgba(6,182,212,.3);color:var(--ac);padding:.15rem .5rem;
  border-radius:20px;margin-left:.4rem;vertical-align:middle;
  -webkit-text-fill-color:var(--ac)}
.tagline{color:var(--txd);font-size:.9rem;margin-top:.4rem}

/* ─── CARD ─── */
.card{background:var(--bg2);border:1px solid var(--bor);border-radius:14px;padding:1.5rem;margin-bottom:1.1rem}

/* ─── DROP ZONE ─── */
.drop{border:2px dashed rgba(124,58,237,.35);border-radius:14px;padding:3rem 2rem;
  text-align:center;cursor:pointer;transition:all .22s;background:rgba(124,58,237,.03);margin-bottom:1.1rem}
.drop:hover,.drop.over{border-color:var(--p);background:rgba(124,58,237,.08);
  box-shadow:0 0 30px rgba(124,58,237,.25);transform:translateY(-2px)}
.drop.hidden{display:none}
.upload-anim{font-size:3.6rem;display:inline-block;margin-bottom:.6rem;
  animation:floatPulse 2.6s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(124,58,237,.4))}
@keyframes floatPulse{
  0%,100%{transform:translateY(0) scale(1);filter:drop-shadow(0 0 8px rgba(124,58,237,.4))}
  50%{transform:translateY(-13px) scale(1.07);filter:drop-shadow(0 0 22px rgba(6,182,212,.7))}}
.drop-ttl{font-size:1.25rem;font-weight:700;margin-bottom:.35rem}
.drop-hint{color:var(--txd);font-size:.82rem;line-height:1.6}

/* ─── FILE INFO ─── */
.finfo{display:none;align-items:center;gap:1rem}
.finfo.show{display:flex}
.fname{font-weight:600;font-size:.95rem}
.fmeta{color:var(--txd);font-size:.78rem;margin-top:3px}
.fclear{margin-left:auto;background:none;border:1px solid rgba(239,68,68,.3);
  color:var(--err);border-radius:6px;padding:.3rem .65rem;cursor:pointer;font-size:.75rem;transition:all .2s}
.fclear:hover{background:rgba(239,68,68,.1)}

/* ─── ERROR BANNER ─── */
.err{display:none;padding:.8rem 1rem;background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.3);border-radius:8px;color:var(--err);font-size:.85rem;margin-bottom:.9rem}
.err.show{display:block}

/* ─── SETTINGS ─── */
.settings-card{display:none}.settings-card.show{display:block}
.sec-lbl{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
  color:var(--txd);margin-bottom:1rem;display:flex;align-items:center;gap:.45rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.1rem}
.col2{grid-column:1/-1}
.sf{display:flex;flex-direction:column;gap:.4rem}
.sf label{font-size:.78rem;color:var(--txd);display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
.sf label .val{color:var(--ac);font-weight:700;margin-left:auto}
.sf input[type=range]{width:100%;accent-color:var(--p);cursor:pointer}
.sf input[type=number],.sf input[type=password]{
  background:var(--bg3);border:1px solid var(--bor);border-radius:8px;
  padding:.6rem .85rem;color:var(--tx);font-size:.86rem;outline:none;width:100%;transition:border-color .2s}
.sf input:focus{border-color:var(--p)}

/* ─── TOOLTIP i BUTTON ─── */
.ib{display:inline-flex;align-items:center;justify-content:center;
  width:15px;height:15px;background:rgba(6,182,212,.2);border:1px solid rgba(6,182,212,.4);
  color:var(--ac);border-radius:50%;font-size:.6rem;font-weight:800;cursor:help;
  flex-shrink:0;position:relative;user-select:none;font-style:normal}
.ib:hover .tip,.ib:focus .tip{opacity:1;pointer-events:auto;transform:translateY(0)}
.tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px);
  background:var(--bg4);border:1px solid var(--bor);border-radius:9px;padding:.65rem .8rem;
  font-size:.73rem;color:var(--tx);width:230px;white-space:normal;line-height:1.45;
  opacity:0;pointer-events:none;transition:all .22s;z-index:200;text-transform:none;
  letter-spacing:0;font-weight:400;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--bg4)}

/* ─── TAGS ─── */
.tags{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.4rem}
.tag{padding:.32rem .7rem;background:var(--bg3);border:1px solid var(--bor);
  border-radius:20px;font-size:.78rem;cursor:pointer;user-select:none;transition:all .2s}
.tag.on{background:rgba(124,58,237,.2);border-color:var(--p);color:var(--pl)}

/* ─── TOGGLE ─── */
.divider{height:1px;background:var(--bor);margin:1.1rem 0}
.tog-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.tog-row span{font-size:.84rem;color:var(--txd)}
.tog{position:relative;flex-shrink:0}
.tog input{position:absolute;opacity:0;width:0;height:0}
.knob{display:block;width:44px;height:23px;background:var(--bg4);border:1px solid var(--bor);
  border-radius:12px;cursor:pointer;transition:all .22s;position:relative}
.knob::after{content:'';position:absolute;width:15px;height:15px;background:var(--txd);
  border-radius:50%;top:3px;left:3px;transition:all .22s}
.tog input:checked+.knob{background:var(--p);border-color:var(--p)}
.tog input:checked+.knob::after{left:22px;background:#fff}

/* ─── AI MODES ─── */
.ai-modes{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-top:.6rem}
.ai-mode-btn{cursor:pointer;display:block}
.ai-mode-btn input{display:none}
.ai-mode-inner{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.65rem .4rem;
  background:var(--bg3);border:2px solid var(--bor);border-radius:10px;
  transition:all .2s;text-align:center;height:100%}
.ai-mode-btn:hover .ai-mode-inner{border-color:rgba(124,58,237,.4)}
.ai-mode-btn input:checked+.ai-mode-inner{border-color:var(--p);background:rgba(124,58,237,.15)}
.ai-mode-ico{font-size:1.5rem}
.ai-mode-lbl{font-size:.78rem;font-weight:700;line-height:1.2}
.ai-mode-sub{font-size:.65rem;color:var(--txd);line-height:1.3}
.ai-key-row{margin-top:.75rem;display:none}
.hint{font-size:.78rem;color:var(--txd);line-height:1.55;margin-top:.75rem;padding:.7rem .9rem;
  background:rgba(6,182,212,.05);border-radius:8px;border-left:3px solid rgba(6,182,212,.4)}
@media(max-width:500px){.ai-modes{grid-template-columns:1fr 1fr}}

/* ─── MAIN BUTTON ─── */
.act{text-align:center;margin:1.4rem 0}
#btnMain{display:none;align-items:center;gap:.7rem;
  background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:14px;
  padding:1.05rem 3.2rem;font-size:1.25rem;font-weight:900;color:#fff;cursor:pointer;
  letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 0 40px rgba(124,58,237,.5),0 8px 24px rgba(0,0,0,.4);
  transition:all .22s;overflow:hidden;position:relative}
#btnMain.show{display:inline-flex}
#btnMain:hover:not(:disabled){transform:translateY(-3px);
  box-shadow:0 0 60px rgba(124,58,237,.7),0 12px 32px rgba(0,0,0,.5)}
#btnMain:disabled{opacity:.5;cursor:not-allowed;transform:none}
#btnMain::before{content:'';position:absolute;top:0;left:-120%;width:70%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),transparent);
  transform:skewX(-20deg);animation:shine 3.5s infinite}
@keyframes shine{0%{left:-120%}70%,100%{left:180%}}

/* ─── PROGRESS ─── */
.prog-card{display:none}.prog-card.show{display:block}
.steps{display:flex;gap:5px;margin-bottom:1.1rem}
.step{flex:1;height:4px;border-radius:2px;background:var(--bg4);transition:background .3s}
.step.done{background:var(--ok)}.step.act{background:var(--p);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.45}}
.pbar{background:var(--bg3);border-radius:8px;height:10px;overflow:hidden;margin:.6rem 0}
.pfill{height:100%;background:linear-gradient(90deg,var(--p),var(--ac));border-radius:8px;width:0%;transition:width .45s ease}
.plbl{text-align:center;font-size:.82rem;color:var(--txd);margin-bottom:.7rem}
.logbox{background:var(--bg3);border-radius:8px;padding:.7rem .9rem;height:130px;overflow-y:auto;
  font-family:'Courier New',monospace;font-size:.73rem;color:var(--txd)}
.logbox::-webkit-scrollbar{width:4px}
.logbox::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px}
.le{margin-bottom:3px;line-height:1.45}
.lok{color:var(--ok)}.lerr{color:var(--err)}.linf{color:var(--ac)}.lwarn{color:var(--warn)}

/* ─── WAVEFORM ─── */
.wf-card{display:none}.wf-card.show{display:block}
canvas#wfCanvas{width:100%;height:90px;border-radius:8px;display:block;cursor:crosshair;background:var(--bg3)}
.wf-cursor{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.4);pointer-events:none;display:none}
.wf-wrap{position:relative;margin-bottom:.5rem}
.wf-foot{display:flex;justify-content:space-between;font-size:.72rem;color:var(--txd);margin-top:4px}
.wf-legend{display:flex;gap:1.2rem;flex-wrap:wrap;margin-top:.5rem}
.wf-leg-item{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--txd)}
.wf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ─── SEGMENTS ─── */
.segs-card{display:none}.segs-card.show{display:block}
.segs-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.segs-counter{font-size:.82rem;color:var(--txd)}
.sa-btn{background:var(--bg3);border:1px solid var(--bor);color:var(--txd);
  border-radius:6px;padding:.3rem .75rem;cursor:pointer;font-size:.75rem;transition:all .2s}
.sa-btn:hover{border-color:var(--p);color:var(--pl)}
.segs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem}
.sc{background:var(--bg3);border:1px solid var(--bor);border-radius:10px;overflow:hidden;transition:all .2s;position:relative}
.sc:hover{border-color:rgba(124,58,237,.5);transform:translateY(-2px)}
.sc.excluded{opacity:.35;filter:grayscale(.8)}
.sc-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);opacity:0;transition:.2s;pointer-events:none;z-index:2}
.sc.excluded .sc-overlay{opacity:1}
.sc-overlay-txt{font-size:.8rem;font-weight:700;color:var(--err)}
.sc-preview{width:100%;height:90px;background:#000;display:block;cursor:pointer;position:relative}
.sc-thumb{width:100%;height:90px;object-fit:cover;display:block;background:var(--bg4)}
.sc-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.45);opacity:0;transition:.2s;cursor:pointer;z-index:1}
.sc-preview:hover .sc-play-btn{opacity:1}
.sc-play-icon{font-size:1.8rem}
.sc-body{padding:.65rem .75rem}
.sc-type{font-size:.7rem;font-weight:700;letter-spacing:.06em;margin-bottom:.25rem}
.sc-type.kills,.sc-type.multikill,.sc-type.sniper{color:#ef4444}
.sc-type.exp{color:#f97316}
.sc-type.react,.sc-type.laugh,.sc-type.eyecontact{color:#a855f7}
.sc-type.neardeath{color:#f43f5e}
.sc-type.squadwipe{color:#6366f1}
.sc-type.gulag{color:#8b5cf6}
.sc-type.victory{color:#eab308}
.sc-type.action{color:var(--ac)}
.sc-time{font-size:.82rem;font-weight:700}
.sc-dur{font-size:.72rem;color:var(--txd);margin-top:2px}
.sc-footer{display:flex;gap:.4rem;margin-top:.55rem}
.sc-btn{flex:1;background:var(--bg4);border:1px solid var(--bor);border-radius:5px;
  padding:.3rem;font-size:.72rem;cursor:pointer;color:var(--txd);transition:all .2s;text-align:center}
.sc-btn:hover{border-color:var(--p);color:var(--pl)}
.sc-btn.exc{color:var(--err);border-color:rgba(239,68,68,.25)}
.sc-btn.exc:hover{background:rgba(239,68,68,.1);border-color:var(--err)}
.sc-btn.incl{color:var(--ok);border-color:rgba(16,185,129,.25)}
.sc-btn.incl:hover{background:rgba(16,185,129,.1);border-color:var(--ok)}

/* ─── MODAL ─── */
.modal-bg{display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.85);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bor);border-radius:14px;width:min(700px,95vw);overflow:hidden}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-bottom:1px solid var(--bor)}
.modal-ttl{font-size:.9rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--txd);font-size:1.4rem;cursor:pointer;padding:.2rem .4rem;border-radius:4px;transition:color .2s}
.modal-close:hover{color:var(--tx)}
.modal-body{padding:1rem}
#previewVid{width:100%;border-radius:8px;background:#000;display:block;max-height:360px}
.modal-meta{font-size:.78rem;color:var(--txd);margin-top:.6rem}

/* ─── RENDER BUTTON ─── */
.render-row{display:flex;gap:.75rem;align-items:center;margin-top:1.1rem;flex-wrap:wrap}
#btnRender{flex:1;background:linear-gradient(135deg,var(--ok),#059669);border:none;
  border-radius:10px;padding:.85rem;font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;transition:all .22s;min-width:180px}
#btnRender:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.35)}
#btnRender:disabled{opacity:.4;cursor:not-allowed;transform:none}
.render-note{font-size:.78rem;color:var(--txd)}

/* ─── OUTPUT ─── */
.out-card{display:none}.out-card.show{display:block}
.out-ttl{color:var(--ok);font-weight:700;font-size:1rem;margin-bottom:1.1rem}
.outvid{width:100%;border-radius:8px;background:#000;display:block;margin-bottom:1.1rem;max-height:420px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1.1rem}
.stat{background:var(--bg3);border-radius:8px;padding:.9rem;text-align:center}
.sv{font-size:1.4rem;font-weight:900;color:var(--ac)}
.sl{font-size:.72rem;color:var(--txd);margin-top:4px}
#btnDl{width:100%;background:linear-gradient(135deg,var(--p),#5b21b6);border:none;
  border-radius:10px;padding:.85rem;font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;transition:all .22s;margin-bottom:.6rem}
#btnDl:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.4)}
#btnNew{width:100%;background:var(--bg3);border:1px solid var(--bor);color:var(--txd);
  border-radius:10px;padding:.7rem;font-size:.85rem;cursor:pointer;transition:all .2s}
#btnNew:hover{border-color:var(--p);color:var(--pl)}

/* ─── FOOTER ─── */
.footer{text-align:center;margin-top:2.5rem;padding-bottom:1rem}
.footer a{color:var(--txd);font-size:.78rem;text-decoration:none;opacity:.6;transition:opacity .2s}
.footer a:hover{opacity:1;color:var(--ac)}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}
  .logo{font-size:1.9rem}.segs-grid{grid-template-columns:1fr 1fr}
  #btnMain{padding:.9rem 2rem;font-size:1.1rem}.ai-modes{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="toastBox" class="toast-box"></div>

<div class="wrap">

<header class="hdr">
  <div class="logo">✂️ NeuroClip<span class="ver">v1</span></div>
  <div class="tagline" id="tagline"></div>
</header>

<div class="drop" id="drop">
  <input type="file" id="fin" accept="video/*" hidden>
  <div class="upload-anim">🎬</div>
  <div class="drop-ttl" id="drop_ttl"></div>
  <div class="drop-hint" id="drop_hint"></div>
</div>

<div class="card finfo" id="finfo">
  <div style="font-size:1.9rem">🎬</div>
  <div><div class="fname" id="fname"></div><div class="fmeta" id="fmeta"></div></div>
  <button class="fclear" id="fclear" onclick="App.reset()">✕</button>
</div>

<div class="err" id="errbox"></div>

<div class="card settings-card" id="settingsCard">
  <div class="sec-lbl" id="lbl_settings"></div>
  <div class="grid2">
    <div class="sf">
      <label>
        <i class="ib" tabindex="0">i<span class="tip" id="tip_sens"></span></i>
        <span id="lbl_sens"></span>
        <span class="val" id="sensval">70%</span>
      </label>
      <input type="range" id="sens" min="10" max="95" value="70">
    </div>
    <div class="sf">
      <label>
        <i class="ib" tabindex="0">i<span class="tip" id="tip_minc"></span></i>
        <span id="lbl_minc"></span>
      </label>
      <input type="number" id="minc" value="2" min="1" max="30">
    </div>
    <div class="sf">
      <label>
        <i class="ib" tabindex="0">i<span class="tip" id="tip_maxc"></span></i>
        <span id="lbl_maxc"></span>
      </label>
      <input type="number" id="maxc" value="12" min="3" max="60">
    </div>
    <div class="sf">
      <label>
        <i class="ib" tabindex="0">i<span class="tip" id="tip_padb"></span></i>
        <span id="lbl_padb"></span>
      </label>
      <input type="number" id="padb" value="1" min="0" max="10">
    </div>
    <div class="sf">
      <label>
        <i class="ib" tabindex="0">i<span class="tip" id="tip_pada"></span></i>
        <span id="lbl_pada"></span>
      </label>
      <input type="number" id="pada" value="1" min="0" max="15">
    </div>
    <div class="sf col2">
      <label>
        <i class="ib" tabindex="0">i<span class="tip" id="tip_types"></span></i>
        <span id="lbl_types"></span>
      </label>
      <div class="tags">
        <div class="tag on"  data-t="kills">🔫 <span id="t_kills"></span></div>
        <div class="tag on"  data-t="multikill">🎯 <span id="t_multikill"></span></div>
        <div class="tag on"  data-t="exp">💥 <span id="t_exp"></span></div>
        <div class="tag on"  data-t="react">😱 <span id="t_react"></span></div>
        <div class="tag on"  data-t="laugh">😂 <span id="t_laugh"></span></div>
        <div class="tag on"  data-t="eyecontact">👁️ <span id="t_eyecontact"></span></div>
        <div class="tag on"  data-t="neardeath">❤️ <span id="t_neardeath"></span></div>
        <div class="tag on"  data-t="squadwipe">💀 <span id="t_squadwipe"></span></div>

const $ = id=>document.getElementById(id);
const sh = id=>$(id).classList.add('show');
const hd = id=>$(id).classList.remove('show');
const ft = s=>{const m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${String(sec).padStart(2,'0')}`;};
const fs = b=>b>1e9?`${(b/1e9).toFixed(1)} GB`:b>1e6?`${(b/1e6).toFixed(1)} MB`:`${(b/1e3).toFixed(0)} KB`;

function toast(msg,type='info',ms=4500){
  const b=$('toastBox'),d=document.createElement('div');
  d.className=`toast toast-${type}`;d.textContent=msg;b.appendChild(d);
  setTimeout(()=>{d.classList.add('out');setTimeout(()=>d.remove(),350);},ms);
}

function log(msg,cls=''){
  const box=$('logbox'),el=document.createElement('div');
  el.className='le '+cls;el.textContent=`[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(el);box.scrollTop=box.scrollHeight;
}

function setP(pct,txt){
  $('pfill').style.width=Math.min(100,Math.max(0,pct))+'%';
  if(txt)$('plbl').textContent=txt;
}

function setSteps(done,active,total=6){
  const row=$('stepsRow');row.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='step'+(i<done?' done':i===active?' act':'');
    row.appendChild(d);
  }
}

function showErr(msg){$('errbox').textContent=msg;sh('errbox');}
function hideErr(){hd('errbox');}

/* ════════════════════════════════════════════════════════════════
   AUDIO ANALYSIS — IIR filters + improved laugh/sniper detection
════════════════════════════════════════════════════════════════ */
async function analyzeAudio(audioBuf,c){
  const ch=audioBuf.getChannelData(0);
  const sr=audioBuf.sampleRate;
  const N=ch.length;
  log(`Аудио: ${ft(audioBuf.duration)} · ${sr} Гц · ${N.toLocaleString()} сэмплов`,'linf');
  setP(28,'IIR фильтры…');

  function lpf(src,cutHz){
    const a=Math.exp(-2*Math.PI*cutHz/sr),b=1-a;
    const out=new Float32Array(N);let y=0;
    for(let i=0;i<N;i++){y=a*y+b*src[i];out[i]=y;}
    return out;
  }

  const lp80  =lpf(ch,80);
  const lp400 =lpf(ch,400);
  const lp3500=lpf(ch,3500);
  await new Promise(r=>setTimeout(r,0));

  const subBand  =lp80;
  const bassArr  =new Float32Array(N);for(let i=0;i<N;i++)bassArr[i] =lp400[i] -lp80[i];
  const voiceArr =new Float32Array(N);for(let i=0;i<N;i++)voiceArr[i]=lp3500[i]-lp400[i];
  const highArr  =new Float32Array(N);for(let i=0;i<N;i++)highArr[i] =ch[i]    -lp3500[i];
  await new Promise(r=>setTimeout(r,0));

  const hopMs=25,winMs=50;
  const hop=Math.floor(sr*hopMs/1000);
  const win=Math.floor(sr*winMs/1000);

  function wRMS(band){
    const out=[];
    let s=0;
    for(let j=0;j<win&&j<N;j++)s+=band[j]*band[j];
    out.push({t:0,e:Math.sqrt(s/win)});
    for(let i=hop;i+win<N;i+=hop){
      for(let j=i-hop;j<i;j++)         s-=band[j]*band[j];
      for(let j=i-hop+win;j<i+win;j++) s+=band[j]*band[j];
      out.push({t:i/sr,e:Math.sqrt(Math.max(0,s)/win)});
    }
    return out;
  }

  const rmsAll  =wRMS(ch);
  const rmsSub  =wRMS(subBand);
  const rmsBass =wRMS(bassArr);
  const rmsVoice=wRMS(voiceArr);
  const rmsHigh =wRMS(highArr);
  await new Promise(r=>setTimeout(r,0));
  state.rmsData=rmsAll;

  function bStats(arr){
    const vals=arr.map(x=>x.e);
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const std=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length);
    return{mean,std};
  }

  const k=0.9+(1-c.sens)*3.3;
  const stSub  =bStats(rmsSub);
  const stBass =bStats(rmsBass);
  const stVoice=bStats(rmsVoice);
  const stHigh =bStats(rmsHigh);

  const thrSub  =stSub.mean  +k*stSub.std;
  const thrBass =stBass.mean +k*stBass.std;
  const thrVoice=stVoice.mean+k*0.85*stVoice.std;
  const thrHigh =stHigh.mean +k*0.78*stHigh.std;

  log(`k=${k.toFixed(2)} · суббас=${thrSub.toFixed(5)} · голос=${thrVoice.toFixed(5)} · высок=${thrHigh.toFixed(5)}`,'linf');
  setP(36,'Поиск моментов…');

  const moments=[];
  const lastT={};

  function peaks(arr,thr,type,gap){
    if(!c.types.includes(type))return;
    for(let i=1;i<arr.length-1;i++){
      if(arr[i].e>thr&&arr[i].e>=arr[i-1].e&&arr[i].e>=arr[i+1].e){
        const t=arr[i].t;
        if(!lastT[type]||t-lastT[type]>gap){moments.push({t,type,e:arr[i].e});lastT[type]=t;}
      }
    }
  }

  // 🔫 Gunshots — transient ratio spike in high band
  if(c.types.includes('kills')){
    for(let i=5;i<rmsHigh.length-1;i++){
      const prev=(rmsHigh[i-1].e+rmsHigh[i-2].e+rmsHigh[i-3].e+rmsHigh[i-4].e)/4;
      if(prev>2e-6&&rmsHigh[i].e/(prev+1e-12)>3.5&&rmsHigh[i].e>thrHigh){
        const t=rmsHigh[i].t;
        if(!lastT['kills']||t-lastT['kills']>0.25){moments.push({t,type:'kills',e:rmsHigh[i].e});lastT['kills']=t;}
      }
    }
  }

  // 🎯 Multi-kill — 3+ kill-transients within 2.5 sec
  if(c.types.includes('multikill')){
    const killMoments=moments.filter(m=>m.type==='kills').map(m=>m.t);
    for(let i=2;i<killMoments.length;i++){
      if(killMoments[i]-killMoments[i-2]<2.5){
        const t=killMoments[i-1];
        if(!lastT['multikill']||t-lastT['multikill']>3){
          moments.push({t,type:'multikill',e:1});lastT['multikill']=t;
        }
      }
    }
  }

  // 🎯 Sniper — isolated high-freq crack after ≥600ms of quiet
  if(c.types.includes('sniper')){
    const silWin=Math.ceil(600/hopMs);
    for(let i=silWin+3;i<rmsHigh.length-2;i++){
      const prevPeak=rmsHigh.slice(i-silWin,i-1).reduce((a,b)=>Math.max(a,b.e),0);
      const quiet=prevPeak<stHigh.mean+0.8*stHigh.std;
      const ratio=rmsHigh[i].e/(rmsHigh[i-1].e+1e-12);
      if(quiet&&ratio>7&&rmsHigh[i].e>thrHigh*1.1){
        const t=rmsHigh[i].t;
        if(!lastT['sniper']||t-lastT['sniper']>1.5){moments.push({t,type:'sniper',e:rmsHigh[i].e});lastT['sniper']=t;}
      }
    }
  }

  // 💥 Explosions — sub-bass peaks
  peaks(rmsSub,thrSub,'exp',0.55);

  // ⚡ General action — bass peaks
  peaks(rmsBass,thrBass,'action',0.4);

  // 😱 Reactions — voice peaks (loud single spikes)
  peaks(rmsVoice,thrVoice,'react',0.5);

  // 😂 Laughter — rhythmic voice bursts with HIGH variance (NOT helicopter/constant sounds)
  //   Helicopter = constant hum → low CV (coefficient of variation)
  //   Laughter   = irregular bursts → high CV
  if(c.types.includes('laugh')){
    const winCv=Math.ceil(1200/hopMs);  // 1.2-second analysis window
    for(let i=winCv;i<rmsVoice.length;i++){
      const slice=rmsVoice.slice(i-winCv,i).map(x=>x.e);
      const m=slice.reduce((a,b)=>a+b,0)/slice.length;
      if(m<thrVoice*0.3)continue;  // too quiet
      const std=Math.sqrt(slice.reduce((a,b)=>a+(b-m)**2,0)/slice.length);
      const cv=m>1e-7?std/m:0;  // coefficient of variation
      // Laughter: HIGH cv (irregular) + moderate energy + current frame above threshold
      // Helicopters/planes: LOW cv (constant) even if loud → filtered out
      if(cv>0.48&&rmsVoice[i].e>thrVoice*0.55){
        const t=rmsVoice[Math.max(0,i-Math.floor(winCv/2))].t;
        if(!lastT['laugh']||t-lastT['laugh']>2.5){moments.push({t,type:'laugh',e:rmsVoice[i].e});lastT['laugh']=t;}
      }
    }
  }

  // 🏆 Victory — sustained low-energy then musical tones (quiet phase = end of match)
  if(c.types.includes('victory')){
    const quietWin=Math.ceil(3000/hopMs);
    for(let i=quietWin;i<rmsAll.length-1;i++){
      const prevRMS=rmsAll.slice(i-quietWin,i).map(x=>x.e);
      const prevMean=prevRMS.reduce((a,b)=>a+b,0)/prevRMS.length;
      // Victory: previous 3 seconds were relatively quiet (game ended), then audio starts
      if(prevMean<stHigh.mean*1.5&&rmsAll[i].e>prevMean*2.5){
        const t=rmsAll[i].t;
        if(!lastT['victory']||t-lastT['victory']>15){moments.push({t,type:'victory',e:rmsAll[i].e});lastT['victory']=t;}
      }
    }
  }

  // ❤️ Near death — sustained high energy voice+bass (player panicking)
  if(c.types.includes('neardeath')){
    for(let i=1;i<rmsVoice.length-1;i++){
      const combined=rmsVoice[i].e*0.6+rmsBass[i].e*0.4;
      const thr=stVoice.mean*0.7+stBass.mean*0.3+k*0.7*(stVoice.std*0.6+stBass.std*0.4);
      if(combined>thr){
        const t=rmsVoice[i].t;
        if(!lastT['neardeath']||t-lastT['neardeath']>2.0){moments.push({t,type:'neardeath',e:combined});lastT['neardeath']=t;}
      }
    }
  }

  // Sort + dedup 200ms
  moments.sort((a,b)=>a.t-b.t);
  const deduped=[],seen=new Set();
  for(const m of moments){
    const bucket=Math.round(m.t*5);
    if(!seen.has(bucket)){seen.add(bucket);deduped.push(m);}
  }

  const counts={};deduped.forEach(m=>counts[m.type]=(counts[m.type]||0)+1);
  log('Найдено: '+(Object.entries(counts).map(([t,n])=>`${t}:${n}`).join(' · ')||'ничего'));
  return deduped;
}

function buildSegs(moments,c,dur){
  const raw=moments.map(m=>({start:Math.max(0,m.t-c.padb),end:Math.min(dur,m.t+c.pada),type:m.type}))
    .sort((a,b)=>a.start-b.start);
  const merged=[];
  for(const s of raw){
    if(!merged.length||s.start>merged[merged.length-1].end+0.05)merged.push({...s,excluded:false});
    else merged[merged.length-1].end=Math.max(merged[merged.length-1].end,s.end);
  }
  return merged.filter(s=>{const d=s.end-s.start;return d>=c.minc&&d<=c.maxc;});
}

/* ════════════════════════════════════════════════════════════════
   WAVEFORM
════════════════════════════════════════════════════════════════ */
function drawWaveform(rmsArr,moments,segs,dur){
  const canvas=$('wfCanvas');
  const W=canvas.offsetWidth||860;canvas.width=W;canvas.height=90;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,90);
  if(!rmsArr.length)return;
  const maxE=Math.max(...rmsArr.map(r=>r.e))||1,H=90,mid=H/2;
  ctx.fillStyle='rgba(124,58,237,0.35)';
  for(let x=0;x<W;x++){
    const idx=Math.floor(x/W*rmsArr.length);
    let mv=0;
    for(let j=idx;j<Math.min(idx+Math.ceil(rmsArr.length/W),rmsArr.length);j++)mv=Math.max(mv,rmsArr[j].e);
    const h=Math.max(1,(mv/maxE)*(mid-4));
    ctx.fillRect(x,mid-h,1,h*2);
  }
  for(const s of segs){
    const x1=s.start/dur*W,x2=s.end/dur*W;
    ctx.fillStyle=s.excluded?'rgba(239,68,68,0.1)':'rgba(6,182,212,0.13)';
    ctx.fillRect(x1,0,x2-x1,H);
    ctx.strokeStyle=s.excluded?'rgba(239,68,68,0.45)':'rgba(6,182,212,0.5)';
    ctx.lineWidth=1;ctx.strokeRect(x1,0,x2-x1,H);
  }
  const TC={kills:'#ef4444',multikill:'#ef4444',sniper:'#ef4444',exp:'#f97316',
            react:'#a855f7',laugh:'#eab308',eyecontact:'#06b6d4',
            neardeath:'#f43f5e',squadwipe:'#6366f1',victory:'#eab308',action:'#94a3b8'};
  for(const m of moments){
    const x=m.t/dur*W,col=TC[m.type]||'#fff';
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,8,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.25;ctx.fillStyle=col;ctx.fillRect(x-.5,13,1,H-13);ctx.globalAlpha=1;
  }
  $('wfEnd').textContent=ft(dur);
  canvas.onmousemove=e=>{
    const r=canvas.getBoundingClientRect();
    $('wfHover').textContent=ft((e.clientX-r.left)/r.width*dur);
    $('wfCursor').style.cssText=`display:block;left:${((e.clientX-r.left)/r.width*100)}%`;
  };
  canvas.onmouseleave=()=>{$('wfCursor').style.display='none';$('wfHover').textContent='';};
}

/* ════════════════════════════════════════════════════════════════
   VISUAL ANALYSIS — 3 modes
════════════════════════════════════════════════════════════════ */
async function grabFrame(t){
  const vid=$('srcVid');vid.currentTime=t;
  await new Promise(res=>{const h=()=>{vid.removeEventListener('seeked',h);res();};vid.addEventListener('seeked',h);setTimeout(res,2500);});
  const W=Math.min(vid.videoWidth||640,640);
  const H=Math.round(W*(vid.videoHeight||360)/(vid.videoWidth||640));
  const c=document.createElement('canvas');c.width=W;c.height=H;
  c.getContext('2d').drawImage(vid,0,0,W,H);return c;
}

async function grabThumb(t){
  if(state.thumbCache[t])return state.thumbCache[t];
  const c=await grabFrame(t);const url=c.toDataURL('image/jpeg',0.55);
  state.thumbCache[t]=url;return url;
}

function analyzeFrameBrowser(canvas){
  const W=canvas.width,H=canvas.height;
  const d=canvas.getContext('2d').getImageData(0,0,W,H).data;
  function reg(x1f,y1f,x2f,y2f){
    const x1=Math.floor(x1f*W),y1=Math.floor(y1f*H),x2=Math.floor(x2f*W),y2=Math.floor(y2f*H);
    let r=0,g=0,b=0,lum=0,contrast=0,skinPx=0,n=0,prevL=0;
    for(let y=y1;y<y2;y++)for(let x=x1;x<x2;x++){
      const i=(y*W+x)*4,ri=d[i],gi=d[i+1],bi=d[i+2];
      const L=0.299*ri+0.587*gi+0.114*bi;
      r+=ri;g+=gi;b+=bi;lum+=L;contrast+=Math.abs(L-prevL);prevL=L;n++;
      if(ri>90&&ri>gi*1.15&&gi>bi*1.2&&ri<235&&L>50&&L<210)skinPx++;
    }
    return n?{r:r/n,g:g/n,b:b/n,lum:lum/n,contrast:contrast/n,skin:skinPx/n}:{r:0,g:0,b:0,lum:0,contrast:0,skin:0};
  }
  let score=0,type='action';const signals=[];
  const kf=reg(0.60,0,1.0,0.20);
  const kfS=Math.min(1,kf.contrast/11)*0.65+(kf.r>140&&kf.r>kf.g*1.2&&kf.lum>55?0.45:0)*0.35;
  if(kfS>0.26){score+=kfS*0.45;type='kills';signals.push(`kill feed ${(kfS*100).toFixed(0)}%`);}
  const eL=reg(0,0.05,.10,0.95),eR=reg(0.90,0.05,1,0.95),eB=reg(0.1,0.88,0.9,1),eT=reg(0.1,0,0.9,0.12);
  const edgeRed=[eL,eR,eB,eT].reduce((a,e)=>a+Math.max(0,(e.r-Math.max(e.g,e.b))/255*(e.lum/220)),0)/4;
  if(edgeRed>0.04){score+=Math.min(0.55,edgeRed*7)*0.35;type='neardeath';signals.push(`low HP ${(edgeRed*100).toFixed(0)}%`);}
  const cen=reg(0.10,0.08,0.90,0.92);
  if(cen.r>cen.b*1.5&&cen.g>cen.b*1.1&&cen.lum>148){const fl=Math.min(1,(cen.lum-95)/125);score+=fl*0.45;type='exp';signals.push(`explosion ${(fl*100).toFixed(0)}%`);}
  if(cen.lum>185){const sat=Math.max(cen.r,cen.g,cen.b)-Math.min(cen.r,cen.g,cen.b);if(sat<40){score+=0.65;type='victory';signals.push('victory screen');}}
  const corners=[reg(0,0.68,0.28,1),reg(0.72,0.68,1,1),reg(0.72,0,1,0.32),reg(0,0,0.28,0.32)];
  const bestCam=Math.max(...corners.map(c=>c.skin));
  const full=reg(0,0,1,1);
  if(bestCam>0.12&&bestCam>full.skin*2.5){score+=0.6;type='eyecontact';signals.push(`eye contact ${(bestCam*100).toFixed(0)}%`);}
  let spots=0;
  for(let sy=0.22;sy<0.78;sy+=0.05)for(let sx=0.18;sx<0.82;sx+=0.05){
    const px=Math.floor(sx*W),py=Math.floor(sy*H),i=(py*W+px)*4;
    if(d[i]>185&&d[i+1]>148&&d[i+2]<90)spots++;
  }
  if(spots>3){score+=Math.min(1,spots/10)*0.20;signals.push(`damage ${spots}px`);}
  return{h:score>0.20,c:Math.min(1,score),type,reason:signals.join(' · ')||'no signals'};
}

async function aiCheckGemini(canvas,key){
  const b64=canvas.toDataURL('image/jpeg',0.65).split(',')[1];
  const PROMPT=`Analyze this Warzone 2026 gameplay screenshot for video highlight detection.

Check specifically:
- KILL FEED: top-right corner, white text lines with player names + skull/weapon icons between them
- DAMAGE NUMBERS: white or yellow floating numbers anywhere
- "ELIMINATED" or "KNOCKED" large text on screen
- "SQUAD WIPED" banner (very high value)
- LOW HEALTH: strong RED vignette pulsing around ALL screen edges
- EXPLOSION: large orange/yellow bright flash 30%+ of screen
- GULAG: prison cage arena, 1v1 environment
- VICTORY: bright white "WARZONE" logo or white results screen with low saturation
- EYE CONTACT: small webcam box in any corner showing human face looking at camera
- MULTI-KILL: 2+ lines in kill feed simultaneously

Respond ONLY with raw JSON, no markdown, no explanation:
{"h":true,"c":0.87,"type":"kills","reason":"kill feed 2 entries top right"}

type: kills multikill exp react neardeath squadwipe gulag victory eyecontact sniper action
No highlight: {"h":false,"c":0.05,"type":"action","reason":"no highlights"}`;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:'image/jpeg',data:b64}},{text:PROMPT}]}],
         generationConfig:{maxOutputTokens:100,temperature:0,topP:0.05}})});
    const data=await r.json();
    if(data.error){log('Gemini: '+data.error.message,'lwarn');return{h:true,c:0.5};}
    const txt=(data.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```json?|```|\n/g,'').trim();
    if(!txt)return{h:false,c:0.1,type:'action'};
    const res=JSON.parse(txt);
    log(`Gemini [${res.type}] c=${res.c} — ${res.reason||''}`);
    return res;
  }catch(e){log('Gemini: '+e.message,'lwarn');return{h:true,c:0.5};}
}

async function aiCheckClaude(canvas,key){
  const b64=canvas.toDataURL('image/jpeg',0.55).split(',')[1];
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01',
               'anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:100,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Warzone 2026 screenshot. Highlight? kill feed top-right, damage numbers, ELIMINATED, SQUAD WIPED, red vignette=low HP, orange flash=explosion, gulag, victory white screen, webcam corner face=eye contact, 2+ kills=multikill, isolated crack after quiet=sniper. ONLY JSON: {"h":true/false,"c":0.0-1.0,"type":"kills|multikill|exp|react|neardeath|squadwipe|gulag|victory|eyecontact|sniper|action","reason":"brief"}'}
      ]}]})});
    const data=await r.json();
    if(data.error){log('Claude: '+data.error.message,'lwarn');return{h:true,c:0.5};}
    const txt=(data.content?.[0]?.text||'{"h":true,"c":0.5}').replace(/```json?|```/g,'').trim();
    return JSON.parse(txt);
  }catch(e){log('Claude: '+e.message,'lwarn');return{h:true,c:0.5};}
}

async function checkFrame(canvas,c){
  switch(c.aiMode){
    case 'browser':return analyzeFrameBrowser(canvas);
    case 'gemini': return await aiCheckGemini(canvas,c.geminiKey);
    case 'claude': return await aiCheckClaude(canvas,c.claudeKey);
    default:       return{h:true,c:1.0};
  }
}

/* ════════════════════════════════════════════════════════════════
   FFMPEG
════════════════════════════════════════════════════════════════ */
async function loadFFmpeg(){
  log('Загружаем FFmpeg WebAssembly (~27 МБ)...','linf');
  const{FFmpeg}              =await import('https://esm.sh/@ffmpeg/ffmpeg@0.12.10');
  const{toBlobURL,fetchFile} =await import('https://esm.sh/@ffmpeg/util@0.12.1');
  window.__fetchFile=fetchFile;
  const ff=new FFmpeg();
  ff.on('log',({message})=>{if(/error/i.test(message))log(message.slice(0,120),'lerr');});
  ff.on('progress',({progress})=>{if(progress>0&&progress<=1)setP(72+progress*22,`FFmpeg: ${Math.round(progress*100)}%`);});
  const base='https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
  let lp=0;
  const mkP=lbl=>({received,total})=>{if(!total||total<1000)return;const pct=Math.round(received/total*100);if(pct!==lp){lp=pct;setP(3+pct*0.09,`${lbl}: ${pct}% (${fs(received)})`);};};
  setP(2,'Загружаем worker...');
  const wt=await fetch('./ffmpeg-worker.js').then(r=>r.text());
  const workerURL=URL.createObjectURL(new Blob([wt],{type:'text/javascript'}));
  lp=0;
  const coreURL=await toBlobURL(`${base}/ffmpeg-core.js`,'text/javascript',true,mkP('Core JS'));
  lp=0;
  const wasmURL=await toBlobURL(`${base}/ffmpeg-core.wasm`,'application/wasm',true,mkP('WASM'));
  await ff.load({classWorkerURL:workerURL,coreURL,wasmURL});
  log('FFmpeg загружен ✓','lok');
  return{ff,fetchFile};
}

async function extractAudio(ff,fetchFile){
  log('Записываем видео в VFS...','linf');
  await ff.writeFile('inp.mp4',await fetchFile(state.file));
  log('Извлекаем аудио...','linf');
  await ff.exec(['-i','inp.mp4','-vn','-acodec','pcm_s16le','-ar','22050','-ac','1','aud.wav']);
  const wav=await ff.readFile('aud.wav');
  log(`Аудио: ${fs(wav.byteLength)}`);
  const ctx=new AudioContext({sampleRate:22050});
  const buf=await ctx.decodeAudioData(wav.buffer.slice(0));
  await ctx.close();return buf;
}

async function cutMerge(ff,segs){
  log(`Нарезаем ${segs.length} клипов...`,'linf');
  const names=[];
  for(let i=0;i<segs.length;i++){
    const s=segs[i],name=`s${i}.mp4`;
    log(`[${i+1}/${segs.length}] ${ft(s.start)} → ${ft(s.end)}`);
    await ff.exec(['-ss',s.start.toFixed(3),'-i','inp.mp4','-t',(s.end-s.start).toFixed(3),'-c','copy','-avoid_negative_ts','1',name]);
    names.push(name);
    setP(72+(i/segs.length)*22,`Нарезаем ${i+1}/${segs.length}`);
  }
  log('Объединяем...','linf');
  const lst=names.map(n=>`file '${n}'`).join('\n');
  await ff.writeFile('lst.txt',new TextEncoder().encode(lst));
  await ff.exec(['-f','concat','-safe','0','-i','lst.txt','-c','copy','out.mp4']);
  const data=await ff.readFile('out.mp4');
  log(`Готово: ${fs(data.byteLength)}`,'lok');
  try{for(const n of['inp.mp4','aud.wav','lst.txt',...names])await ff.deleteFile(n).catch(()=>{});}catch{}
  return new Blob([data.buffer],{type:'video/mp4'});
}

/* ════════════════════════════════════════════════════════════════
   SEGMENTS EDITOR
════════════════════════════════════════════════════════════════ */
const TYPE_LABELS={
  kills:'🔫 KILL',multikill:'🎯 MULTI-KILL',exp:'💥 ВЗРЫВ',react:'😱 КРИК',laugh:'😂 СМЕХ',
  eyecontact:'👁️ ЗРИТ.КОНТАКТ',neardeath:'❤️ НИЗКОЕ HP',squadwipe:'💀 ВАЙП',
  sniper:'🎯 СНАЙПЕР',gulag:'🎮 ГУЛАГ',victory:'🏆 ПОБЕДА',vehicle:'🚁 ТРАНСПОРТ',action:'⚡ ЭКШН'
};

function updateCounter(){
  const on=state.segs.filter(s=>!s.excluded).length;
  const dur=state.segs.filter(s=>!s.excluded).reduce((a,s)=>a+s.end-s.start,0);
  $('segsCounter').textContent=`Выбрано ${on} из ${state.segs.length} · ~${ft(dur)}`;
  $('btnRender').disabled=on===0;
  $('renderNote').textContent=on===0?T('toast_none'):`~${ft(dur)} · ${on} клипов`;
}

async function renderSegCards(){
  const grid=$('segsGrid');grid.innerHTML='';
  for(let i=0;i<state.segs.length;i++){
    const s=state.segs[i],mid=(s.start+s.end)/2;
    const card=document.createElement('div');
    card.className='sc'+(s.excluded?' excluded':'');card.id=`sc_${i}`;
    const pw=document.createElement('div');pw.className='sc-preview';
    pw.innerHTML=`<img class="sc-thumb" id="th_${i}" src="" alt=""><div class="sc-play-btn"><div class="sc-play-icon">▶</div></div><div class="sc-overlay"><div class="sc-overlay-txt">ИСКЛЮЧЁН</div></div>`;
    pw.addEventListener('click',()=>App.openPreview(i));
    const body=document.createElement('div');body.className='sc-body';
    body.innerHTML=`<div class="sc-type ${s.type}">${TYPE_LABELS[s.type]||'⚡ МОМЕНТ'}</div><div class="sc-time">${ft(s.start)} – ${ft(s.end)}</div><div class="sc-dur">${ft(s.end-s.start)}</div><div class="sc-footer"><button class="sc-btn ${s.excluded?'incl':'exc'}" onclick="App.toggleSeg(${i})">${s.excluded?'✅ Включить':'❌ Исключить'}</button></div>`;
    card.appendChild(pw);card.appendChild(body);grid.appendChild(card);
    grabThumb(mid).then(url=>{const img=$(`th_${i}`);if(img){img.src=url;img.onerror=()=>img.style.display='none';}});
  }
  updateCounter();sh('segsCard');
}

/* ════════════════════════════════════════════════════════════════
   MAIN FLOWS — fixed progress scaling
════════════════════════════════════════════════════════════════ */
async function analyze(){
  if(!state.file){toast('Сначала загрузи видео!','err');return;}
  if(state.busy)return;
  const c=cfg();
  if(c.aiMode==='gemini'&&!c.geminiKey){toast(T('toast_err_gemini'),'err');return;}
  if(c.aiMode==='claude'&&!c.claudeKey){toast(T('toast_err_claude'),'err');return;}

  state.busy=true;hideErr();
  $('btnMain').disabled=true;$('logbox').innerHTML='';
  hd('outCard');hd('wfCard');hd('segsCard');sh('progCard');

  try{
    // Step 0 — Load FFmpeg (0-12%)
    setSteps(0,0);setP(0,T('progress_init'));
    if(!state.ff){
      const{ff,fetchFile}=await loadFFmpeg();
      state.ff=ff;state.fetchFile=fetchFile;
    }else log('FFmpeg уже загружен ✓','lok');
    setP(12);

    // Step 1 — Extract audio (12-25%)
    setSteps(1,1);setP(12,'Извлекаем аудио...');
    const audioBuf=await extractAudio(state.ff,state.fetchFile);
    setP(25);

    // Step 2 — Audio analysis (25-45%)
    setSteps(2,2);setP(25,'Аудио анализ...');
    const moments=await analyzeAudio(audioBuf,c);
    state.moments=moments;
    setP(45);

    if(!moments.length){
      setP(100,'Готово');setSteps(6,6);
      toast(T('toast_none'),'err',7000);
      state.busy=false;$('btnMain').disabled=false;
      $('btnMain').textContent=T('btn_reanalyze');
      return;
    }

    const dur=state.dur||(moments[moments.length-1].t+c.pada+5);
    state.segs=buildSegs(moments,c,dur);
    log(`Сегментов: ${state.segs.length}`);

    if(!state.segs.length){
      toast('Сегменты не сформированы — уменьши мин. длину клипа или повысь чувствительность','err',7000);
      state.busy=false;$('btnMain').disabled=false;return;
    }

    // Step 3 — Visual AI (45-68%) [only if not 'none']
    if(c.aiMode!=='none'){
      const name={browser:'Браузерный AI',gemini:'Gemini',claude:'Claude'}[c.aiMode];
      setSteps(3,3);setP(45,`${name}: анализируем...`);
      log(`${name} · ${state.segs.length} сегментов`,'linf');
      const kept=[];
      for(let i=0;i<state.segs.length;i++){
        const s=state.segs[i];
        // Fixed progress: 45 → 68 over N segments
        setP(45+(i/state.segs.length)*23,`${name}: ${i+1}/${state.segs.length}`);
        const canvas=await grabFrame((s.start+s.end)/2);
        const res=await checkFrame(canvas,c);
        const ok=res.h!==false||(res.c||0)>=0.25;
        if(res.type&&ok)s.type=res.type;
        log(`[${ft((s.start+s.end)/2)}] ${ok?'✅':'❌'} ${Math.round((res.c||0)*100)}%${res.reason?' — '+res.reason:''}`);
        if(ok)kept.push(s);
        if(c.aiMode!=='browser')await new Promise(r=>setTimeout(r,180));
      }
      if(kept.length>0){state.segs=kept;log(`Подтверждено: ${kept.length}`,'lok');}
      else log('Ни один не подтверждён — используем аудио','lwarn');
      setP(68);
    }else{
      setSteps(3,3);setP(68);
    }

    // Step 4 — Waveform + thumbnails (68-72%)
    setSteps(4,4);setP(68,'Строим аудиограмму...');
    sh('wfCard');
    setTimeout(()=>drawWaveform(state.rmsData,state.moments,state.segs,dur),50);
    await renderSegCards();
    setP(72);

    // Done for analyze phase
    setSteps(6,6);setP(100,'✅ Анализ завершён!');
    log(`Готово! ${state.segs.length} моментов. Просмотри и нажми "Склеить".`,'lok');
    $('segsCard').scrollIntoView({behavior:'smooth',block:'start'});
    $('btnMain').textContent=T('btn_reanalyze');$('btnMain').disabled=false;

  }catch(e){
    log('ОШИБКА: '+e.message,'lerr');
    toast('Ошибка: '+e.message,'err');
    console.error(e);$('btnMain').disabled=false;
  }finally{state.busy=false;}
}

async function render(){
  const active=state.segs.filter(s=>!s.excluded);
  if(!active.length){toast(T('toast_none'),'err');return;}
  if(state.busy)return;
  state.busy=true;$('btnRender').disabled=true;$('logbox').innerHTML='';
  hd('outCard');sh('progCard');setSteps(0,0,3);setP(0,'Рендеринг...');
  try{
    setSteps(1,1,3);setP(5,'Нарезаем...');
    const blob=await cutMerge(state.ff,active);
    state.blob=blob;
    setSteps(3,3,3);setP(100,'✅ Готово!');
    log('🎉 Нарезка готова!','lok');
    const totalDur=active.reduce((s,x)=>s+x.end-x.start,0);
    const saved=state.dur>0?Math.max(0,Math.round((1-totalDur/state.dur)*100)):0;
    $('sseg').textContent=active.length;
    $('sdur').textContent=ft(totalDur);
    $('ssav').textContent=saved+'%';
    $('ssize').textContent=fs(blob.size);
    const url=URL.createObjectURL(blob);
    $('outvid').src=url;
    $('btnDl').onclick=()=>{const a=document.createElement('a');a.href=url;a.download='neuorclip_'+state.file.name.replace(/\.[^.]+$/,'')+'.mp4';a.click();};
    sh('outCard');$('outCard').scrollIntoView({behavior:'smooth',block:'start'});
    toast('✅ Нарезка готова! Скачивай.','ok');
  }catch(e){
    log('ОШИБКА рендера: '+e.message,'lerr');
    toast('Ошибка рендера: '+e.message,'err');
    console.error(e);
  }finally{state.busy=false;$('btnRender').disabled=false;}
}

/* ════════════════════════════════════════════════════════════════
   PUBLIC API
════════════════════════════════════════════════════════════════ */
function toggleSeg(idx){
  const s=state.segs[idx];s.excluded=!s.excluded;
  const card=$(`sc_${idx}`);
  card.classList.toggle('excluded',s.excluded);
  const btn=card.querySelector('.sc-btn');
  if(s.excluded){btn.textContent='✅ Включить';btn.className='sc-btn incl';}
  else{btn.textContent='❌ Исключить';btn.className='sc-btn exc';}
  updateCounter();
  const dur=state.dur||state.segs[state.segs.length-1].end;
  drawWaveform(state.rmsData,state.moments,state.segs,dur);
}

function selectAll(){state.segs.forEach((_,i)=>{state.segs[i].excluded=false;});renderSegCards();const dur=state.dur||state.segs[state.segs.length-1].end;drawWaveform(state.rmsData,state.moments,state.segs,dur);}
function selectNone(){state.segs.forEach((_,i)=>{state.segs[i].excluded=true;});renderSegCards();const dur=state.dur||state.segs[state.segs.length-1].end;drawWaveform(state.rmsData,state.moments,state.segs,dur);}

function openPreview(idx){
  const s=state.segs[idx],vid=$('previewVid');
  vid.src=state.srcUrl;vid.currentTime=s.start;
  $('modalTtl').textContent=`${TYPE_LABELS[s.type]||'Момент'} · ${ft(s.start)} – ${ft(s.end)}`;
  $('modalMeta').textContent=`Длина: ${ft(s.end-s.start)}`;
  sh('modalBg');
  vid.ontimeupdate=()=>{if(vid.currentTime>=s.end){vid.pause();vid.currentTime=s.start;}};
  vid.play().catch(()=>{});
}

function closePreview(e){
  if(e&&e.target!==$('modalBg'))return;
  const vid=$('previewVid');vid.pause();vid.src='';hd('modalBg');
}

function reset(){
  if(state.srcUrl){URL.revokeObjectURL(state.srcUrl);state.srcUrl=null;}
  Object.assign(state,{file:null,dur:0,rmsData:[],moments:[],segs:[],blob:null,thumbCache:{}});
  $('srcVid').src='';
  ['finfo','settingsCard','progCard','wfCard','segsCard','outCard','errbox'].forEach(hd);
  $('btnMain').classList.remove('show');$('btnMain').disabled=false;
  $('btnMain').querySelector('#btn_analyze_txt').textContent=T('btn_analyze');
  $('fin').value='';$('logbox').innerHTML='';
  drop.classList.remove('hidden');  // ← показываем зону загрузки снова
}

window.App={analyze,render,toggleSeg,selectAll,selectNone,reset,openPreview,closePreview};
</script>
